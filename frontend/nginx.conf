server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 帶 hash 檔名的資產：內容變了檔名就變，可長期快取
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 其餘（含 index.html 與 SPA fallback）每次重新驗證，
    # 避免瀏覽器啟發式快取讓部署新版後仍載入舊 bundle
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
