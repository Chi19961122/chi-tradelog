# 機密可由專案根目錄的 .env 覆寫（參考 .env.example）；未設定時使用開發預設值。
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: chitradelog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chitradelog"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__ConnectionString: "Host=postgres;Port=5432;Database=chitradelog;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      # JWT 簽章金鑰：正式環境務必以 .env 的 JWT_KEY 覆寫（至少 32 bytes）
      Jwt__Key: ${JWT_KEY:-dev-only-signing-key-change-in-production-min-32-bytes-long!!}
      # 允許容器內 nginx 前端與本機 Vite dev 的來源
      Cors__AllowedOrigins__0: "http://localhost:8080"
      Cors__AllowedOrigins__1: "http://localhost:5173"
    ports:
      - "5079:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # 瀏覽器透過 host 對應埠呼叫後端
        VITE_API_BASE_URL: "http://localhost:5079"
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
